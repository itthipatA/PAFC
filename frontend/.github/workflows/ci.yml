name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Test
        run: npx jest --coverage
      
      - name: Build
        run: npm run build
