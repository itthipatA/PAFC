services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pafc
      POSTGRES_USER: pafc
      POSTGRES_PASSWORD: pafc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pafc -d pafc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
