services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pafc
      POSTGRES_USER: pafc
      POSTGRES_PASSWORD: pafc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pafc -d pafc"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      PAFC_DATABASE_URL: "postgresql+asyncpg://pafc:pafc@db:5432/pafc"
      PAFC_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
